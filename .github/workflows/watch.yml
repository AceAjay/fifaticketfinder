name: World Cup Ticket Watcher

on:
  schedule:
    # Every hour, on the hour, UTC. Adjust cadence here if you want it tighter
    # or looser closer to matchday.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watch_tickets.py
