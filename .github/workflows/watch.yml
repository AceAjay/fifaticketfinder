name: World Cup Ticket Watcher

on:
  schedule:
    # Every hour, at :17 past — NOT on the hour. GitHub explicitly warns
    # that "0 * * * *" (top of every hour) is the most congested slot on
    # their platform since most repos default to it, and scheduled runs
    # can be silently delayed or dropped during that load spike. Minute
    # 17 avoids that pile-up.
    - cron: "17 * * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watch_tickets.py
